<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <h1>RAG<span class="accent">Chat</span></h1>
    </div>

    <h2 class="login-title">
      @if (isSetupMode()) { Create Admin Account } @else { Welcome back }
    </h2>
    <p class="login-subtitle">
      @if (isSetupMode()) {
        No admin found. Set up your account to get started.
      } @else {
        Sign in to access the knowledge base.
      }
    </p>

    @if (error()) {
      <div class="error-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error() }}
      </div>
    }

    <div class="form-group">
      <label>Username</label>
      <input
        type="text"
        [ngModel]="username()"
        (ngModelChange)="username.set($event)"
        (keydown)="onKeyDown($event)"
        placeholder="Enter username"
        [disabled]="isLoading()"
        autocomplete="username"
        class="form-input">
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (keydown)="onKeyDown($event)"
          placeholder="Enter password"
          [disabled]="isLoading()"
          autocomplete="current-password"
          class="form-input">
        <button type="button" class="toggle-pw" (click)="showPassword.set(!showPassword())">
          @if (showPassword()) {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          }
        </button>
      </div>
    </div>

    @if (!isSetupMode()) {
      <label class="remember-me">
        <input
          type="checkbox"
          [ngModel]="rememberMe()"
          (ngModelChange)="rememberMe.set($event)">
        <span class="checkmark"></span>
        Remember me for 30 days
      </label>
    }

    <button class="btn-primary" (click)="submit()" [disabled]="isLoading()">
      @if (isLoading()) {
        <div class="btn-spinner"></div>
        @if (isSetupMode()) { Creating... } @else { Signing in... }
      } @else {
        @if (isSetupMode()) { Create Account } @else { Sign In }
      }
    </button>

    <div class="divider"><span>or</span></div>

    <button class="btn-skip" (click)="onSkip()" [disabled]="isLoading()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Skip — Chat only (anonymous)
    </button>
  </div>
</div>
